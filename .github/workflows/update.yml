name: Update Blacklists (Feeds + Validator)

on:
  schedule:
    - cron: '0 4,16 * * *' # Runs 4 hours after crawl_bot.yml starts (04:00, 16:00 UTC)
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'scripts/crawler.py'
      - 'scripts/validator.py'
      - 'config.yaml'
      - 'whitelist.txt'

permissions:
  contents: write

jobs:
  update:
    name: Fetch Feeds and Validate Blacklists
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Public Blocklist Feeds
        # Downloads curated blacklist feeds from public sources
        # (OISD, AdGuard, URLHaus, StevenBlack, Phishing Army, etc.)
        # and merges them into raw/<category>.txt files.
        run: python scripts/crawler.py

      - name: Validate and Compile Blacklists
        # Reads all raw/ files, validates domain syntax, applies whitelist
        # to prevent false positives, writes clean categories/ and master/
        # files, and updates stats.json for the dashboard.
        run: python scripts/validator.py

      - name: Commit and Push Final Lists
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw/ categories/ master/ stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: update blacklists from feeds [skip ci]"
            git push origin main
          fi
