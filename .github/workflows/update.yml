name: Update Blacklists and Dashboard Stats

on:
  schedule:
    - cron: '0 */8 * * *' # 3 times a day (every 8 hours)
  workflow_dispatch: # Enable manual run
  push:
    branches:
      - main
    paths:
      - 'config.yaml'
      - 'whitelist.txt'
      - 'scripts/update_blacklist.py'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Blacklist Update Script
        run: python scripts/update_blacklist.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add categories/ master/ stats.json
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: update blacklists and statistics [skip ci]"
            git push origin main
          fi
