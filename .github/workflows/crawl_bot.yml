name: Autonomous Crawler Bot

on:
  schedule:
    - cron: '0 0,8,16 * * *' # 3 times a day: 00:00, 08:00, 16:00 UTC
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'scripts/crawl_bot.py'
      - 'config.yaml'

permissions:
  contents: write

jobs:
  crawl:
    name: Run Autonomous Crawler Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler Bot
        # Visits seed pages, detects category from page content,
        # follows outbound links for up to 1 hour (crawler_duration_seconds in config.yaml),
        # and appends discovered domains into raw/<category>.txt files.
        run: python scripts/crawl_bot.py

      - name: Commit Crawled Domains to raw/
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw/
          if git diff --cached --quiet; then
            echo "No new domains discovered."
          else
            git commit -m "bot: append crawled domains to raw/ [skip ci]"
            git push origin main
          fi
