name: Cleanup Workflow Run History

on:
  schedule:
    - cron: '0 0 */4 * *' # Every 4 days at midnight UTC
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    name: Delete Old Workflow Runs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete failed/cancelled runs
        run: |
          gh run list --repo ${{ github.repository }} --status failure --limit 100 --json databaseId -q '.[].databaseId' | xargs -r gh run delete --repo ${{ github.repository }} --yes || true
          gh run list --repo ${{ github.repository }} --status cancelled --limit 100 --json databaseId -q '.[].databaseId' | xargs -r gh run delete --repo ${{ github.repository }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old successful runs (older than 7 days)
        run: |
          cutoff=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          gh run list --repo ${{ github.repository }} --status completed --limit 500 --json databaseId,createdAt -q \
            ".[] | select(.createdAt < \"$cutoff\") | .databaseId" | \
            xargs -r gh run delete --repo ${{ github.repository }} --yes || true
          gh run list --repo ${{ github.repository }} --status success --limit 500 --json databaseId,createdAt -q \
            ".[] | select(.createdAt < \"$cutoff\") | .databaseId" | \
            xargs -r gh run delete --repo ${{ github.repository }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
